<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Downloader</title>
<style>
  :root{
    --bg:#0f1115; --card:#171a21; --card-2:#1e222b; --line:#2a2f3a;
    --text:#e8eaed; --muted:#9aa3b2; --accent:#4f8cff; --accent-press:#3b74e0;
    --ok:#37c98b; --err:#ff6b6b; --radius:14px;
  }
  *{box-sizing:border-box}
  body{
    margin:0; min-height:100vh; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex; justify-content:center; padding:24px 16px 60px;
  }
  .wrap{width:100%; max-width:560px}
  h1{font-size:22px; margin:8px 0 2px; letter-spacing:-.2px}
  .sub{color:var(--muted); font-size:13px; margin:0 0 22px}
  .card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:18px}
  label{display:block; font-size:13px; color:var(--muted); margin-bottom:7px}
  input[type=text],select{
    width:100%; padding:13px 14px; background:var(--card-2); color:var(--text);
    border:1px solid var(--line); border-radius:10px; font-size:15px; outline:none;
  }
  input[type=text]:focus,select:focus{border-color:var(--accent)}
  .btn{
    width:100%; padding:13px 14px; border:0; border-radius:10px; font-size:15px;
    font-weight:600; cursor:pointer; background:var(--accent); color:#fff; margin-top:12px;
    transition:background .15s, opacity .15s;
  }
  .btn:hover{background:var(--accent-press)}
  .btn:disabled{opacity:.5; cursor:not-allowed}
  .btn.secondary{background:var(--card-2); color:var(--text); border:1px solid var(--line)}
  .hidden{display:none !important}

  .preview{display:flex; gap:14px; margin-top:18px; align-items:flex-start}
  .thumb{width:150px; min-width:150px; aspect-ratio:16/9; border-radius:10px; object-fit:cover; background:var(--card-2)}
  .pv-title{font-size:15px; font-weight:600; line-height:1.3; margin:0 0 6px}
  .pv-meta{font-size:12.5px; color:var(--muted)}
  .pv-meta span{display:inline-block; margin-right:12px}

  .prog-wrap{margin-top:16px}
  .bar{height:9px; background:var(--card-2); border-radius:99px; overflow:hidden}
  .bar-fill{height:100%; width:0%; background:var(--accent); border-radius:99px; transition:width .3s ease}
  .prog-label{display:flex; justify-content:space-between; font-size:12.5px; color:var(--muted); margin-top:8px}

  .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;display:inline-block;vertical-align:-3px;margin-right:8px;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  .msg{margin-top:14px; padding:12px 14px; border-radius:10px; font-size:13.5px; line-height:1.4}
  .msg.error{background:rgba(255,107,107,.1); border:1px solid rgba(255,107,107,.35); color:#ffb3b3}
  .msg.success{background:rgba(55,201,139,.1); border:1px solid rgba(55,201,139,.35); color:#8ff0c4}

  .foot{margin-top:18px; font-size:11.5px; color:var(--muted); text-align:center; line-height:1.5}
  @media (max-width:440px){
    .preview{flex-direction:column}
    .thumb{width:100%; min-width:0}
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Video Downloader</h1>
  <p class="sub">Paste a single YouTube video link. Personal use.</p>

  <div class="card">
    <label for="url">YouTube video URL</label>
    <input type="text" id="url" placeholder="https://www.youtube.com/watch?v=..." autocomplete="off" spellcheck="false">
    <button class="btn" id="fetchBtn">Fetch info</button>

    <div id="infoMsg" class="msg error hidden"></div>

    <!-- preview + format + download -->
    <div id="result" class="hidden">
      <div class="preview">
        <img id="thumb" class="thumb" alt="">
        <div>
          <p id="pvTitle" class="pv-title"></p>
          <div class="pv-meta">
            <span id="pvUploader"></span>
            <span id="pvDuration"></span>
          </div>
        </div>
      </div>

      <div style="margin-top:16px">
        <label for="fmt">Format</label>
        <select id="fmt"></select>
      </div>

      <button class="btn" id="downloadBtn">Download</button>

      <!-- progress -->
      <div id="progWrap" class="prog-wrap hidden">
        <div class="bar"><div id="barFill" class="bar-fill"></div></div>
        <div class="prog-label">
          <span id="progStatus">Starting…</span>
          <span id="progPct">0%</span>
        </div>
      </div>

      <div id="dlMsg" class="msg hidden"></div>
    </div>
  </div>

  <p class="foot">Runs yt-dlp on the backend. Only download content you have the right to.</p>
</div>

<script>
const $ = id => document.getElementById(id);
let pollTimer = null;

function fmtDuration(s){
  s = Math.round(s||0);
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
  const pad = n => String(n).padStart(2,'0');
  return h ? `${h}:${pad(m)}:${pad(sec)}` : `${m}:${pad(sec)}`;
}
function showInfoError(t){ const el=$('infoMsg'); el.textContent=t; el.classList.remove('hidden'); }
function hideInfoError(){ $('infoMsg').classList.add('hidden'); }
function showDlMsg(t, kind){ const el=$('dlMsg'); el.textContent=t; el.className='msg '+kind; el.classList.remove('hidden'); }
function hideDlMsg(){ $('dlMsg').classList.add('hidden'); }

// ---- Fetch info ----
$('fetchBtn').addEventListener('click', fetchInfo);
$('url').addEventListener('keydown', e => { if(e.key==='Enter') fetchInfo(); });

async function fetchInfo(){
  const url = $('url').value.trim();
  hideInfoError();
  $('result').classList.add('hidden');
  if(!url){ showInfoError('Please paste a YouTube link.'); return; }

  const btn = $('fetchBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Fetching…';
  try{
    const res = await fetch('/api/info', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({url})
    });
    const data = await res.json();
    if(!res.ok){ showInfoError(data.error || 'Could not fetch info.'); return; }

    $('thumb').src = data.thumbnail || '';
    $('pvTitle').textContent = data.title || 'Untitled';
    $('pvUploader').textContent = data.uploader || '';
    $('pvDuration').textContent = '⏱ ' + fmtDuration(data.duration);

    const sel = $('fmt');
    sel.innerHTML = '';
    (data.formats || []).forEach(f => {
      const o = document.createElement('option');
      o.value = f.value; o.textContent = f.label;
      sel.appendChild(o);
    });

    hideDlMsg();
    $('progWrap').classList.add('hidden');
    $('downloadBtn').disabled = false;
    $('result').classList.remove('hidden');
  }catch(err){
    showInfoError('Network error. Is the server running?');
  }finally{
    btn.disabled = false;
    btn.textContent = 'Fetch info';
  }
}

// ---- Download ----
$('downloadBtn').addEventListener('click', startDownload);

async function startDownload(){
  const url = $('url').value.trim();
  const format = $('fmt').value;
  hideDlMsg();
  const btn = $('downloadBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Preparing…';

  try{
    const res = await fetch('/api/download', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({url, format})
    });
    const data = await res.json();
    if(!res.ok){
      showDlMsg(data.error || 'Could not start download.', 'error');
      btn.disabled = false; btn.textContent = 'Download';
      return;
    }
    $('progWrap').classList.remove('hidden');
    setProgress(0, 'Starting…');
    poll(data.job_id);
  }catch(err){
    showDlMsg('Network error while starting download.', 'error');
    btn.disabled = false; btn.textContent = 'Download';
  }
}

function setProgress(pct, label){
  $('barFill').style.width = (pct||0)+'%';
  $('progPct').textContent = Math.round(pct||0)+'%';
  if(label) $('progStatus').textContent = label;
}

function poll(jobId){
  clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    try{
      const res = await fetch('/api/progress/'+jobId);
      const d = await res.json();
      if(!res.ok){
        clearInterval(pollTimer);
        finishError(d.error || 'Lost track of the download.');
        return;
      }
      if(d.status === 'downloading'){
        const eta = d.eta ? ` · ~${d.eta}s left` : '';
        setProgress(d.progress, 'Downloading'+eta);
      }else if(d.status === 'processing'){
        setProgress(99, 'Converting…');
      }else if(d.status === 'starting'){
        setProgress(d.progress||0, 'Starting…');
      }else if(d.status === 'finished'){
        clearInterval(pollTimer);
        setProgress(100, 'Done');
        // trigger the actual browser download (streams then deletes server-side)
        window.location.href = '/api/file/'+jobId;
        showDlMsg('Download started — check your files.', 'success');
        resetDownloadBtn();
      }else if(d.status === 'error'){
        clearInterval(pollTimer);
        finishError(d.error || 'Download failed.');
      }
    }catch(err){
      clearInterval(pollTimer);
      finishError('Lost connection to the server.');
    }
  }, 800);
}

function finishError(msg){
  showDlMsg(msg, 'error');
  $('progWrap').classList.add('hidden');
  resetDownloadBtn();
}
function resetDownloadBtn(){
  const btn = $('downloadBtn');
  btn.disabled = false; btn.textContent = 'Download';
}
</script>
</body>
</html>
